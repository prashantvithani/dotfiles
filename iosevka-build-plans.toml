u = "toothed-serifless"
v = "curly-serifless"
w = "curly-serifless"
x = "curly-serifless"
y = "curly-serifless"
z = "curly-serifless"

[buildPlans.IosevkaCustomCondensed.variants.italic]
one = "no-base"
two = "straight-neck-serifless"
three = "two-arcs"
four = "closed-serifless"
five = "upright-arched-serifless"
six = "straight-bar"
seven = "straight-serifless"
eight = "crossing"
nine = "straight-bar"
zero = "oval-long-dotted"
g = "double-storey"
k = "cursive-serifless"
u = "toothed-serifless"
v = "cursive-serifless"
w = "cursive-serifless"
x = "cursive"
y = "cursive-serifless"
z = "straight-serifless"

[buildPlans.IosevkaCustomCondensed.widths.Normal]
shape = 500
menu = 5
css = "normal"

[buildPlans.IosevkaCustomCondensed.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.IosevkaCustomCondensed.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"

