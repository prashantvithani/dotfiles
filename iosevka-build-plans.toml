two = "straight-neck-serifless"
three = "two-arcs"
four = "closed-serifless"
five = "oblique-arched-serifless"
six = "open-contour"
seven = "bend-serifless"
eight = "crossing-asymmetric"
nine = "open-contour"
zero = "oval-dotted"
g = "double-storey"
