[buildPlans.IosevkaCustomCondensed]
family = "Iosevka Custom Condensed"
spacing = "normal"
serifs = "sans"
noCvSs = false
exportGlyphNames = true

[buildPlans.IosevkaCustomCondensed.variants.design]
