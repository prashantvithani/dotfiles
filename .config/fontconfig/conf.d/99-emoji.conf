<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Preference and fallback order for sans-serif family -->
  <alias binding="strong">
    <family>emoji</family>
    <prefer>
      <family>Emoji One</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>
</fontconfig>

