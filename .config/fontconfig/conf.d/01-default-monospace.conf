<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'urn:fontconfig:fonts.dtd'>
<fontconfig>
  <alias>
      <family>Courier</family>
      <prefer>
  	<family>Iosevka Custom Condensed</family>
      </prefer>
  </alias>

  <alias>
    <family>Iosevka Custom Condensed</family>
    <default>
      <family>monospace</family>
    </default>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Iosevka Custom Condensed</family>
    </prefer>
  </alias>

  <alias>
    <family>Iosevka Custom Condensed</family>
    <default>
      <family>ui-monospace</family>
    </default>
  </alias>
  <alias>
    <family>ui-monospace</family>
    <prefer>
      <family>Iosevka Custom Condensed</family>
    </prefer>
  </alias>
</fontconfig>
